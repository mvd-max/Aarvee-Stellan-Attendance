<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>સ્ટેલન / આરવી હાજરી સિસ્ટમ</title>

<style>

body{
    margin:0;
    padding:0;
    background:#f2f2f2;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:420px;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
    text-align:center;
}

h2{
    color:#0066cc;
    margin-bottom:20px;
    font-size:28px;
}

select{
    width:100%;
    padding:15px;
    font-size:20px;
    border-radius:8px;
    margin-top:10px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#inBtn{
    background:#1c9c2d;
    color:white;
}

#outBtn{
    background:#d62828;
    color:white;
}

#location{
    margin-top:15px;
    font-size:18px;
    color:#333;
    font-weight:bold;
}

#msg{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>📋 સ્ટેલન / આરવી હાજરી સિસ્ટમ</h2>

<select id="employee">

<option value="">કર્મચારી પસંદ કરો</option>

<option value="101|સાજીદ અન્સારી">101 - સાજીદ અન્સારી</option>

<option value="102|માનસિંહ શ્રીનિવાસ">102 - માનસિંહ શ્રીનિવાસ</option>

<option value="103|સેનવા સંજયકુમાર">103 - સેનવા સંજયકુમાર</option>

<option value="104|સુશાંત શેખર પોદાર">104 - સુશાંત શેખર પોદાર</option>

<option value="105|અમિત પોદાર">105 - અમિત પોદાર</option>

<option value="106|સોલંકી ધીરજભાઈ">106 - સોલંકી ધીરજભાઈ</option>

<option value="107|વિનોદ ગજ્જર">107 - વિનોદ ગજ્જર</option>

<option value="108|અવિનાશ">108 - અવિનાશ</option>

<option value="109|હાર્દિક પ્રજાપતિ">109 - હાર્દિક પ્રજાપતિ</option>

<option value="110|પ્રવીણ સિંહ">110 - પ્રવીણ સિંહ</option>

<option value="111|અર્જુન સિંહ">111 - અર્જુન સિંહ</option>

<option value="112|વિનાયક પાટીલ">112 - વિનાયક પાટીલ</option>

<option value="113|મલેક જાવેદ મિયા">113 - મલેક જાવેદ મિયા</option>

<option value="114|અનિલ ઝાલા">114 - અનિલ ઝાલા</option>

<option value="115|કમલેશ વાઘરી">115 - કમલેશ વાઘરી</option>

</select>

<p id="location"></p>

<button id="inBtn" onclick="punchIn()">🟢 આવ્યા</button>

<button id="outBtn" onclick="punchOut()">🔴 ગયા</button>

<p id="msg"></p>

</div>

<script src="attendance.js"></script>

</body>

</html>
